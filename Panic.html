<div class="container py-3" style="max-width:720px;">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h4 class="mb-1">🚨 Panic Button</h4>
      <div class="text-muted" id="info" style="font-size:13px;"></div>
    </div>
    <a class="btn btn-outline-secondary btn-sm" href="<?= baseUrl ?>?page=dashboard">Kembali</a>
  </div>

  <div id="msg" class="alert" style="display:none;"></div>

  <div class="card mb-3">
    <div class="card-body">
      <label class="form-label">Catatan (opsional)</label>
      <textarea id="note" class="form-control" rows="2" placeholder="Contoh: ada orang mencurigakan / butuh bantuan"></textarea>

      <div class="mt-3 text-muted" style="font-size:12px;">
        Lokasi akan diambil dari GPS bila diizinkan. Jika tidak, panic tetap tersimpan.
      </div>

      <div class="d-flex gap-2 mt-3">
        <button id="btn" class="btn btn-danger btn-lg" onclick="panic()" disabled>
          KIRIM PANIC
        </button>
        <button class="btn btn-outline-secondary" onclick="checkGps()">Cek GPS</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="fw-bold mb-2">Status</div>
      <div class="text-muted" id="status"><i>Menyiapkan...</i></div>
    </div>
  </div>
</div>

<script>
  let TOKEN = null;
  let LAST_GPS = null;

  function showMsg(type, text) {
    const el = document.getElementById('msg');
    el.className = 'alert alert-' + (type || 'info');
    el.style.display = text ? 'block' : 'none';
    el.textContent = text || '';
  }

  function deviceInfo() {
    const ua = navigator.userAgent || '';
    const plat = navigator.platform || '';
    return (plat + ' | ' + ua).slice(0, 180);
  }

  function setStatus(txt) {
    document.getElementById('status').textContent = txt;
  }

  function checkGps() {
    setStatus('Meminta izin GPS...');
    if (!navigator.geolocation) {
      setStatus('GPS tidak tersedia di perangkat ini.');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        LAST_GPS = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: pos.coords.accuracy
        };
        setStatus(`GPS OK: ${LAST_GPS.lat.toFixed(6)}, ${LAST_GPS.lng.toFixed(6)} (±${Math.round(LAST_GPS.accuracy)}m)`);
      },
      (err) => {
        LAST_GPS = null;
        setStatus('GPS ditolak / gagal: ' + (err && err.message ? err.message : 'unknown'));
      },
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
    );
  }

  function panic() {
    if (!confirm('Yakin kirim PANIC? Ini akan mengirim alert.')) return;

    showMsg('info', 'Mengirim PANIC...');
    document.getElementById('btn').disabled = true;

    const payload = {
      note: (document.getElementById('note').value || '').trim(),
      device_info: deviceInfo()
    };
    if (LAST_GPS) {
      payload.lat = LAST_GPS.lat;
      payload.lng = LAST_GPS.lng;
      payload.accuracy = LAST_GPS.accuracy;
    }

    google.script.run
      .withSuccessHandler(function(res){
        if (!res || !res.ok) {
          showMsg('warning', (res && res.message) ? res.message : 'Gagal mengirim PANIC.');
          document.getElementById('btn').disabled = false;
          return;
        }
        showMsg('success', res.message || 'PANIC terkirim.');
        setStatus('Terkirim: ' + (res.data && res.data.id_panic ? res.data.id_panic : '-'));
        document.getElementById('btn').disabled = false;
      })
      .withFailureHandler(function(err){
        showMsg('warning', err && err.message ? err.message : 'Terjadi error.');
        document.getElementById('btn').disabled = false;
      })
      .sendPanic(TOKEN, payload);
  }

  (function init(){
    try { TOKEN = localStorage.getItem('PT_TOKEN'); } catch(e) {}
    if (!TOKEN) return window.location.href = '<?= baseUrl ?>?page=login';

    google.script.run.withSuccessHandler(function(res){
      if (!res || !res.ok) {
        try { localStorage.removeItem('PT_TOKEN'); localStorage.removeItem('PT_USER'); } catch(e){}
        window.location.href = '<?= baseUrl ?>?page=login';
        return;
      }
      const u = res.user || {};
      document.getElementById('info').textContent =
        (u.nama || '-') + ' • ' + (u.role || '-') + ' • ' + (u.lokasi_site_default || '-');

      document.getElementById('btn').disabled = false;
      setStatus('Siap. (Disarankan klik "Cek GPS" dulu)');
    }).verifyToken(TOKEN);
  })();
</script>
